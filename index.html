<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JARVIS TEST</title>

<style>

body{
    background:#000;
    color:#00ff00;
    font-family:monospace;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    height:100vh;
    margin:0;
}

button{
    background:#000;
    color:#00ff00;
    border:2px solid #00ff00;
    padding:20px;
    font-size:22px;
    cursor:pointer;
    margin-bottom:20px;
}

#output{
    width:85%;
    max-width:500px;
    min-height:120px;
    border:2px solid #00ff00;
    padding:20px;
    overflow-wrap:break-word;
}

</style>
</head>

<body>

<button id="btn">TEST GPT</button>

<div id="output">
Waiting...
</div>

<script>

const API_KEY = 
"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”;

const btn = document.getElementById("btn");
const output = document.getElementById("output");

btn.addEventListener("click", async () => {

    output.innerHTML = "Button clicked...";

    try {

        output.innerHTML = "Connecting to OpenAI...";

        const response = await fetch(
            "https://api.openai.com/v1/chat/completions",
            {
                method: "POST",

                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${API_KEY}`
                },

                body: JSON.stringify({

                    model: "gpt-3.5-turbo",

                    messages: [
                        {
                            role: "user",
                            content: "Hello Jarvis"
                        }
                    ]

                })

            }
        );

        output.innerHTML = "Response received...";

        const rawText = await response.text();

        console.log(rawText);

        if(!response.ok){

            output.innerHTML =
            "API ERROR:<br><br>" + rawText;

            return;
        }

        const data = JSON.parse(rawText);

        output.innerHTML =
        "<b>JARVIS:</b><br><br>" +
        data.choices[0].message.content;

    }
    catch(error){

        console.log(error);

        output.innerHTML =
        "JS ERROR:<br><br>" + error.message;

    }

});

</script>

</body>
</html>
