<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHOST-AI // JARVIS VOICE NODE</title>
    <style>
        body {
            background-color: #000;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            border: 1px solid #00ff00;
            width: 90vw;
            max-width: 400px;
            height: 85vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
        }
        .header {
            font-weight: bold;
            border-bottom: 1px solid #00ff00;
            padding-bottom: 10px;
            text-align: center;
            letter-spacing: 2px;
        }
        .terminal-box {
            flex-grow: 1;
            margin: 20px 0;
            padding: 15px;
            border: 1px dashed #00ff00;
            background-color: rgba(0, 20, 0, 0.1);
            overflow-y: auto;
            font-size: 14px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        /* Bada Voice Button - No Chatbox anymore! */
        .voice-action-btn {
            background: #000;
            color: #00ff00;
            border: 2px solid #00ff00;
            padding: 20px;
            font-size: 16px;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.2);
        }
        .voice-action-btn.recording {
            color: #ff0000;
            border-color: #ff0000;
            box-shadow: 0 0 20px #ff0000;
            animation: pulse 1.5s infinite;
        }
        .voice-action-btn.processing {
            color: #ffff00;
            border-color: #ffff00;
            box-shadow: 0 0 20px #ffff00;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <span>GHOST-AI // JARVIS CORE</span>
    </div>

    <div class="terminal-box" id="terminal">[SYSTEM]: Voice engine online. Tap the node below to communicate with Jarvis.</div>

    <!-- Ek single main interface button for everything -->
    <button id="actionBtn" class="voice-action-btn" onclick="handleVoiceNodeTap()">TAP TO SPEAK</button>
</div>

<script>
    // ⚠️ Apni Paid OpenAI API Key Yahan Dalein
    const OPENAI_API_KEY = ""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”";

    let mediaRecorder = null;
    let audioChunks = [];
    let isRecording = false;
    let audioStream = null;
    
    const terminal = document.getElementById('terminal');
    const actionBtn = document.getElementById('actionBtn');

    function logToTerminal(sender, message) {
        terminal.innerHTML += `<br><br>[${sender}]: ${message}`;
        terminal.scrollTop = terminal.scrollHeight;
    }

    // Main Control Trigger
    async function handleVoiceNodeTap() {
        if (isRecording) {
            // Manual Stop if user taps again, or let the 5s timeout handle it
            stopRecordingAndProcess();
        } else {
            // Start Listening
            try {
                actionBtn.innerText = "INITIALIZING MIC...";
                audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                mediaRecorder = new MediaRecorder(audioStream, { mimeType: 'audio/webm' });
                audioChunks = [];

                mediaRecorder.ondataavailable = e => {
                    if (e.data.size > 0) audioChunks.push(e.data);
                };

                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    setNodeState('processing', 'PROCESSING AUDIO...');
                    await processVoicePayload(audioBlob);
                };

                // Start hardware capture
                mediaRecorder.start();
                isRecording = true;
                setNodeState('recording', 'LISTENING... (TAP TO SEND)');
                playLocalBeep(440, 100);

                // Auto stop after 6 seconds if user doesn't tap again
                setTimeout(() => {
                    if (isRecording) {
                        stopRecordingAndProcess();
                    }
                }, 6000);

            } catch (err) {
                setNodeState('normal', 'TAP TO SPEAK');
                logToTerminal("ERROR", `Mic Access Denied: ${err.message}. Make sure you allowed permission.`);
            }
        }
    }

    function stopRecordingAndProcess() {
        if (mediaRecorder && mediaRecorder.state === "recording") {
            mediaRecorder.stop();
        }
        if (audioStream) {
            audioStream.getTracks().forEach(track => track.stop());
        }
        isRecording = false;
    }

    function setNodeState(state, text) {
        actionBtn.innerText = text;
        actionBtn.className = "voice-action-btn"; // Reset class
        if (state === 'recording') actionBtn.classList.add('recording');
        if (state === 'processing') actionBtn.classList.add('processing');
    }

    // Core OpenAI Processor
    async function processVoicePayload(audioBlob) {
        try {
            logToTerminal("SYSTEM", "Sending data to Whisper STT...");

            // 1. Audio to Text (Whisper)
            const formData = new FormData();
            formData.append("file", audioBlob, "query.webm");
            formData.append("model", "whisper-1");

            const transResponse = await fetch("https://api.openai.com/v1/audio/transcriptions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${OPENAI_API_KEY}` },
                body: formData
            });
            
            if (!transResponse.ok) throw new Error("Whisper failed. Check your API Key/Balance.");
            
            const transData = await transResponse.json();
            const userCommand = transData.text;
            
            if(!userCommand || userCommand.trim() === "") {
                logToTerminal("SYSTEM", "Empty voice data. Command aborted.");
                setNodeState('normal', 'TAP TO SPEAK');
                return;
            }
            logToTerminal("USER", userCommand);

            // 2. Intelligence Core (GPT-4o)
            setNodeState('processing', 'JARVIS IS THINKING...');
            const gptResponse = await fetch("https://api.openai.com/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${OPENAI_API_KEY}`
                },
                body: JSON.stringify({
                    model: "gpt-4o",
                    messages: [
                        { role: "system", content: "You are Jarvis. Tony Stark's personal AI. Keep responses extremely short, sharp, and highly conversational. Max 2 sentences." },
                        { role: "user", content: userCommand }
                    ]
                })
            });
            const gptData = await gptResponse.json();
            const jarvisReply = gptData.choices[0].message.content;
            logToTerminal("JARVIS", jarvisReply);

            // 3. Audio Synthesis (OpenAI TTS Onyx)
            setNodeState('processing', 'SPEAKING...');
            const ttsResponse = await fetch("https://api.openai.com/v1/audio/speech", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${OPENAI_API_KEY}`
                },
                body: JSON.stringify({
                    model: "tts-1",
                    voice: "onyx", 
                    input: jarvisReply
                })
            });
            
            const audioBlobReturn = await ttsResponse.blob();
            const audioUrl = URL.createObjectURL(audioBlobReturn);
            const voiceOutput = new Audio(audioUrl);
            
            voiceOutput.onended = () => {
                setNodeState('normal', 'TAP TO SPEAK');
            };

            await voiceOutput.play();

        } catch (err) {
            logToTerminal("ERROR", err.message);
            setNodeState('normal', 'TAP TO SPEAK');
        }
    }

    function playLocalBeep(freq, duration) {
        try {
            const context = new (window.AudioContext || window.webkitAudioContext)();
            const osc = context.createOscillator();
            osc.type = "sine";
            osc.frequency.value = freq;
            osc.connect(context.destination);
            osc.start();
            setTimeout(() => osc.stop(), duration);
        } catch(e) {}
    }
</script>
</body>
</html>
