<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jarvis Debug</title>

<style>

body{
background:black;
color:#00ff00;
font-family:monospace;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
height:100vh;
margin:0;
}

button{
padding:20px;
font-size:22px;
background:black;
color:#00ff00;
border:2px solid #00ff00;
margin-bottom:20px;
}

#output{
width:85%;
max-width:500px;
min-height:150px;
border:2px solid #00ff00;
padding:20px;
word-wrap:break-word;
}

</style>
</head>

<body>

<button id="btn">START TEST</button>

<div id="output">
READY
</div>

<script>

const API_KEY =  
"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”;

const btn = document.getElementById("btn");
const output = document.getElementById("output");

btn.onclick = async () => {

output.innerHTML = "BUTTON CLICKED";

try {

output.innerHTML = "SENDING REQUEST...";

const response = await fetch(
"https://api.openai.com/v1/chat/completions",
{
method: "POST",

headers: {
"Content-Type": "application/json",
"Authorization": `Bearer ${API_KEY}`
},

body: JSON.stringify({

model: "gpt-4o-mini",

messages: [
{
role: "user",
content: "Hello"
}
]

})

}
);

output.innerHTML = "REQUEST SENT<br><br>WAITING RESPONSE...";

const text = await response.text();

console.log(text);

output.innerHTML =
"RAW RESPONSE:<br><br>" + text;

}
catch(err){

console.log(err);

output.innerHTML =
"ERROR:<br><br>" + err.message;

}

};

</script>

</body>
</html>
